<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Start Page</title>
  <style>
    :root {
      --bg: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    h1 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 2.2rem;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .search-card,
    .links-card {
      background: rgba(31, 41, 55, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      margin-bottom: 24px;
    }

    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1 1 500px;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    button {
      padding: 14px 18px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .group h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      color: #dbeafe;
    }

    .group a {
      display: block;
      color: var(--text);
      text-decoration: none;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .group a:hover {
      color: #93c5fd;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.8rem;
      }

      button,
      input[type="text"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Launch Pad <a href="Launch_pad_map.html" target="_self">🚀</a></h1>
    <div class="subtitle">A clean homepage with Google search and your favorite links.</div>

    <div class="search-card">
      <form action="https://www.google.com/search" method="get" target="_blank">
        <input type="text" name="q" placeholder="Search Google..." autofocus />
        <button type="submit">Search</button>
      </form>
    </div>

    <div class="links-card">
      <div class="links-grid">
        <div class="group">
          <h2>Everyday</h2>
          <a href="https://mail.google.com" target="_blank">Gmail</a>
          <a href="https://calendar.google.com" target="_blank">Google Calendar</a>
          <a href="https://www.youtube.com" target="_blank">YouTube</a>
        </div>

        <div class="group">
          <h2>Work</h2>
          <a href="https://chatgpt.com" target="_blank">ChatGPT</a>
          <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
          <a href="https://drive.google.com" target="_blank">Google Drive</a>
        </div>

        <div class="group">
          <h2>Reference</h2>
          <a href="https://www.google.com" target="_blank">Google</a>
          <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a>
          <a href="https://news.ycombinator.com"target="_blank">Hacker News</a>
        </div>
      </div>
    </div>

    <div class="footer">Edit the links however you want and save this as your local start page.</div>
  </div>
</body>
</html>
