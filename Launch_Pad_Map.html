<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Pad Map</title>

  <style>
    :root {
      --bg: #111827;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0f172a, #111827);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      color: #dbeafe;
    }

    .back-btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(31, 41, 55, 0.9);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .image-wrapper {
      width: 100%;
      height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .footer {
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .header {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <h1>Launch Map 🗺️</h1>
      <a href="index.html" class="back-btn">← Back to Launch Pad</a>
    </div>

    <div class="image-wrapper">
      <img src="Launch_Pad_Map.png" alt="Launch Pad Map" />
    </div>

    <div class="footer">
      Full mission path overview
    </div>

  </div>
</body>
</html>
